name: "Build Promote"
on:
  push:
    branches: 
      - 'test'
      - 'main'
permissions:
  actions: read # for detecting the Github Actions environment.
  id-token: write # for creating OIDC tokens for signing.
  packages: write # for uploading attestations.
  contents: read
  security-events: write # Required for uploading code scanning.
env:
  JF_RT_URL: "https://psazuse.jfrog.io"
  JOB_SUMMARY: false
  JFROG_CLI_LOG_LEVEL: DEBUG # DEBUG, INFO, WARN, ERROR
  DEFAULT_WORKSPACE: "${{github.workspace}}" 
  REPO_LOCAL_TEST: "prbranch-bpr-test-local"
  RT_REPO_LOCAL_PROD: "prbranch-bpr-prod-local"

jobs:
  buildPromote2Test: 
    name: "Promote: DEV to TEST"
    runs-on: ubuntu-latest
    env:
      BAD_DEPS_DIR: "${{ github.workspace }}/.jfrog/bad-deps"
      ENV: "test"
    defaults:
        run:
          working-directory: "${{env.DEFAULT_WORKSPACE}}"
    # This will evaluate to true for "TEST", "Test", or "test"
    if: ${{ github.ref_name == 'test' }}
    steps:
        - name: "Setup JFrog CLI"
          uses: jfrog/setup-jfrog-cli@v4  # 
          id: jfrog-cli
          env:
            JF_URL: ${{env.JF_RT_URL}}
            JFROG_CLI_LOG_LEVEL: "DEBUG"
          with:
            version: latest 
            oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}
            disable-job-summary: ${{env.JOB_SUMMARY}}

        - name: "Query previous info"
          run: |
              echo "repo: ${{env.REPO_LOCAL_TEST}}"

              echo "Current branch ${git branch --show-current}"
              echo "HEAD: $(git merge-base --is-ancestor develop HEAD)"
              # git merge-base --is-ancestor develop HEAD && echo "From develop" || echo "Not from develop"

              echo "BUILD_NAME='HelloWorld'" >> $GITHUB_ENV
              echo "BUILD_ID=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_ENV


        - name: "Promote to ${{env.ENV}}"
            # jf rt promote ${{env.BUILD_NAME}} ${{env.BUILD_ID}} ${{env.REPO_LOCAL_TEST}}
          run: |
            echo "promote name: ${{env.BUILD_NAME}}, id: ${{env.BUILD_ID}}, repo: ${{env.REPO_LOCAL_TEST}}"

