name: "DEV: Build Create"
on:
  push:
    branches: 
      - 'dev'
permissions:
  actions: read # for detecting the Github Actions environment.
  id-token: write # for creating OIDC tokens for signing.
  packages: write # for uploading attestations.
  contents: read
  security-events: write # Required for uploading code scanning.
env:
  JF_RT_URL: "https://psazuse.jfrog.io"
  JOB_SUMMARY: false
  CLI_LOG_LEVEL: DEBUG # DEBUG, INFO, WARN, ERROR
  DEFAULT_WORKSPACE: "${{github.workspace}}" 
  BUILD_ID: "${{github.run_number}}.0"
  BUILD_NAME: "prbranch-bpr-app" 
  MODULE_NAME: "py-artifacts"
  RT_REPO_VIRTUAL: "prbranch-bpr-virtual"
  RT_REPO_LOCAL_DEV: "prbranch-bpr-dev-local"  # DEFAULT REPO
  # RT_REPO_LOCAL_TEST: "prbranch-bpr-test-local"     
  # RT_REPO_LOCAL_PROD: "prbranch-bpr-prod-local"
  #RT_REPO_REMOTE: "pypi-remote"

jobs:
  buildPublish: 
    name: "DEV: Create Build and Publish "
    runs-on: ubuntu-latest
    env:
      BAD_DEPS_DIR: "${{ github.workspace }}/.jfrog/bad-deps"
    defaults:
        run:
          working-directory: "${{env.DEFAULT_WORKSPACE}}"
        # This will evaluate to true for "DEV", "Dev", or "dev"
    if: ${{ github.ref_name == 'dev' }}
    steps:
        - name: "Setup JFrog CLI"
          uses: jfrog/setup-jfrog-cli@v4  # 
          id: jfrog-cli
          env:
            JF_URL: ${{env.JF_RT_URL}}
            JFROG_CLI_LOG_LEVEL: ${{env.CLI_LOG_LEVEL}}
          with:
            version: latest 
            oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}
            disable-job-summary: ${{env.JOB_SUMMARY}}

        - name: Checkout
          uses: actions/checkout@v6

        - name: "Folder list"
          run: | 
              tree .
              chmod -R 755 **/*

        - name: "JF Show"
          run: | 
              jf c s

        - name: "Setup Summary"
          run: |
            echo "# :frog: Setup Summary :pushpin:" >> $GITHUB_STEP_SUMMARY
            echo " " >> $GITHUB_STEP_SUMMARY
            echo " " >> $GITHUB_STEP_SUMMARY
            echo " - Installed JFrog CLI [$(jf --version)](https://jfrog.com/getcli/) " >> $GITHUB_STEP_SUMMARY
            echo "    - $(jf --version) " >> $GITHUB_STEP_SUMMARY
            echo "    - $(python3 -V) " >> $GITHUB_STEP_SUMMARY
            echo "    - $(pip3 -V) " >> $GITHUB_STEP_SUMMARY
            echo " " >> $GITHUB_STEP_SUMMARY
            echo " " >> $GITHUB_STEP_SUMMARY
            
        - name: "Create pip config"
          run: |
            jf pipc --repo-deploy="${{env.RT_REPO_VIRTUAL}}" --repo-resolve="${{env.RT_REPO_VIRTUAL}}"

        - name: "Install dependencies (environment)"
          run: |
            jf pip install -r requirements.txt --build-name="${{env.BUILD_NAME}}" --build-number="${{env.BUILD_ID}}" --module="${{env.MODULE_NAME}}"

        - name: "Download requirements closure (direct + transitive for build-add-dependencies)"
          run: |
            set -euo pipefail
            mkdir -p "${BAD_DEPS_DIR}"
            jf pip download -r requirements.txt -d "${BAD_DEPS_DIR}"

        - name: "Build info"
          run: |
            jf rt bag "${{env.BUILD_NAME}}" "${{env.BUILD_ID}}"
            jf rt bce "${{env.BUILD_NAME}}" "${{env.BUILD_ID}}"
            jf rt bad "${{env.BUILD_NAME}}" "${{env.BUILD_ID}}" --module="${{env.MODULE_NAME}}" "${BAD_DEPS_DIR}/*"
            jf rt bp "${{env.BUILD_NAME}}" "${{env.BUILD_ID}}" --detailed-summary=true

        - name: "Xray: build scan"
          continue-on-error: true
          run: |
            jf bs ${{env.BUILD_NAME}} ${{env.BUILD_ID}} --format=table --extended-table --vuln --rescan
